<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOC Portfolio - Elite Upgrade</title>
<style>
body{margin:0;font-family:Arial;background:#050b14;color:#fff}
.hero{height:90vh;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,#0b1a2b,#02060c)}
h1{font-size:3rem}
.section{padding:40px}
.card{background:#0d1b2e;padding:20px;margin:10px;border-radius:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
button{padding:10px 20px;background:#00ffaa;border:none;border-radius:6px;cursor:pointer}
.dashboard{background:#02060c;padding:20px;border-radius:12px}
.log{background:#111;padding:10px;margin:5px;border-radius:6px;font-family:monospace}
</style>
</head>
<body>

<section class="hero">
<div>
<h1>Enterprise SOC Lab</h1>
<p>Attack → Detect → Investigate → Report</p>
<button onclick="scrollToSection()">Explore</button>
</div>
</section>

<section class="section" id="dashboard">
<h2>Live SOC Simulation</h2>
<div class="dashboard" id="logs"></div>
</section>

<section class="section">
<h2>Detection Cases</h2>
<div class="grid">
<div class="card">SSH Bruteforce</div>
<div class="card">Windows Logon Attack</div>
<div class="card">PowerShell Abuse</div>
</div>
</section>

<script>
function scrollToSection(){
document.getElementById('dashboard').scrollIntoView({behavior:'smooth'});
}

const logs = [
"10:01 Nmap scan detected",
"10:02 SSH brute force attempt",
"10:03 Wazuh alert triggered",
"10:04 Security Onion alert",
"10:05 Investigation started"
];

let i=0;
function simulate(){
if(i<logs.length){
let div=document.createElement("div");
div.className="log";
div.innerText=logs[i];
document.getElementById("logs").appendChild(div);
i++;
setTimeout(simulate,1000);
}
}
simulate();
</script>

</body>
</html>
