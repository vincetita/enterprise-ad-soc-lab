      <stop offset="100%" stop-color="#0d1b2e"></stop>
    </linearGradient>

    <linearGradient id="zoneGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"></stop>
      <stop offset="100%" stop-color="#111827"></stop>
    </linearGradient>

    <linearGradient id="serverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"></stop>
      <stop offset="100%" stop-color="#1d4ed8"></stop>
    </linearGradient>

    <linearGradient id="linuxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"></stop>
      <stop offset="100%" stop-color="#15803d"></stop>
