  <line x1="835" y1="488" x2="975" y2="575" stroke="#e5eefc" stroke-width="2.5" marker-end="url(#arrow)"></line>
  <line x1="835" y1="685" x2="975" y2="615" stroke="#e5eefc" stroke-width="2.5" marker-end="url(#arrow)"></line>

