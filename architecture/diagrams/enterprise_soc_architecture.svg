<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"></stop>
      <stop offset="100%" stop-color="#0d1b2e"></stop>
    </linearGradient>

    <linearGradient id="attackerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"></stop>
      <stop offset="100%" stop-color="#b91c1c"></stop>
    </linearGradient>

    <linearGradient id="endpointGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"></stop>
      <stop offset="100%" stop-color="#1d4ed8"></stop>
    </linearGradient>

    <linearGradient id="siemGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"></stop>
      <stop offset="100%" stop-color="#0891b2"></stop>
    </linearGradient>

    <linearGradient id="idsGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"></stop>
      <stop offset="100%" stop-color="#6d28d9"></stop>
    </linearGradient>

    <linearGradient id="linuxGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"></stop>
      <stop offset="100%" stop-color="#15803d"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"></feDropShadow>
    </filter>

    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#67e8f9"></path>
    </marker>

    <marker id="arrowYellow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#facc15"></path>
    </marker>

    <marker id="arrowWhite" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e5eefc"></path>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bgGrad)"></rect>

  <!-- Title -->
  <text x="700" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#e5eefc">
    Enterprise AD SOC Lab Architecture
  </text>
  <text x="700" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9db0cf">
    Active Directory • Wazuh SIEM • Security Onion IDS • Sysmon • Kali • Ubuntu
  </text>

  <!-- Outer network box -->
  <rect x="70" y="130" width="1260" height="700" rx="28" fill="none" stroke="#334155" stroke-width="2"></rect>
  <text x="95" y="160" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#94a3b8">
    PRIMARY SOC LAB NETWORK — 192.168.117.0/24
  </text>

  <!-- Attacker -->
  <rect x="110" y="250" width="250" height="140" rx="22" fill="url(#attackerGrad)" filter="url(#shadow)"></rect>
  <text x="235" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#fff">Kali Linux</text>
  <text x="235" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#fee2e2">Attacker Simulation Platform</text>
  <text x="235" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fee2e2">Nmap • Hydra • SMB • Recon</text>

  <!-- DC01 -->
  <rect x="455" y="190" width="285" height="150" rx="22" fill="url(#endpointGrad)" filter="url(#shadow)"></rect>
  <text x="597" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#fff">DC01</text>
  <text x="597" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#dbeafe">Windows Server 2025</text>
  <text x="597" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dbeafe">AD DS • DNS • DHCP</text>
  <text x="597" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dbeafe">Sysmon + Wazuh Agent</text>

  <!-- Win11 -->
  <rect x="455" y="390" width="285" height="150" rx="22" fill="url(#endpointGrad)" filter="url(#shadow)"></rect>
  <text x="597" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#fff">Win11Client</text>
  <text x="597" y="463" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#dbeafe">Windows 11 Endpoint</text>
  <text x="597" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dbeafe">Domain Joined Workstation</text>
  <text x="597" y="513" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dbeafe">Sysmon + Wazuh Agent</text>

  <!-- Ubuntu -->
  <rect x="455" y="590" width="285" height="150" rx="22" fill="url(#linuxGrad)" filter="url(#shadow)"></rect>
  <text x="597" y="633" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#fff">Ubuntu Server</text>
  <text x="597" y="663" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#dcfce7">Linux Monitored Host</text>
  <text x="597" y="688" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dcfce7">SSH Target • auth.log</text>
  <text x="597" y="713" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#dcfce7">Wazuh Agent</text>

  <!-- Wazuh -->
  <rect x="920" y="250" width="300" height="170" rx="22" fill="url(#siemGrad)" filter="url(#shadow)"></rect>
  <text x="1070" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#06202a">Wazuh Manager</text>
  <text x="1070" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#083344">SIEM / Log Correlation</text>
  <text x="1070" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#083344">Windows Logs • Sysmon • Linux Logs</text>
  <text x="1070" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#083344">Alerting • Rules • Investigation</text>

  <!-- Security Onion -->
  <rect x="920" y="500" width="300" height="170" rx="22" fill="url(#idsGrad)" filter="url(#shadow)"></rect>
  <text x="1070" y="547" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#f5f3ff">Security Onion</text>
  <text x="1070" y="577" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ede9fe">Network IDS / NSM</text>
  <text x="1070" y="603" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ede9fe">Suricata • Zeek • Traffic Visibility</text>
  <text x="1070" y="629" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ede9fe">Recon • SSH • SMB • East-West Traffic</text>

  <!-- Attacker arrows -->
  <line x1="360" y1="285" x2="455" y2="250" stroke="#facc15" stroke-width="3" marker-end="url(#arrowYellow)"></line>
  <line x1="360" y1="320" x2="455" y2="465" stroke="#facc15" stroke-width="3" marker-end="url(#arrowYellow)"></line>
  <line x1="360" y1="355" x2="455" y2="660" stroke="#facc15" stroke-width="3" marker-end="url(#arrowYellow)"></line>

  <text x="365" y="236" font-family="Arial, sans-serif" font-size="13" fill="#fde68a">Recon / SMB / auth</text>
  <text x="365" y="470" font-family="Arial, sans-serif" font-size="13" fill="#fde68a">Failed logons / user activity</text>
  <text x="365" y="705" font-family="Arial, sans-serif" font-size="13" fill="#fde68a">SSH brute force</text>

  <!-- Endpoint to Wazuh -->
  <line x1="740" y1="265" x2="920" y2="300" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrowCyan)"></line>
  <line x1="740" y1="465" x2="920" y2="335" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrowCyan)"></line>
  <line x1="740" y1="665" x2="920" y2="380" stroke="#67e8f9" stroke-width="3" marker-end="url(#arrowCyan)"></line>

  <text x="790" y="240" font-family="Arial, sans-serif" font-size="13" fill="#a5f3fc">Windows Security + Sysmon</text>
  <text x="785" y="430" font-family="Arial, sans-serif" font-size="13" fill="#a5f3fc">Endpoint telemetry</text>
  <text x="778" y="615" font-family="Arial, sans-serif" font-size="13" fill="#a5f3fc">Linux auth + system logs</text>

  <!-- Network to Security Onion -->
  <path d="M740 220 C830 210, 860 220, 920 545" fill="none" stroke="#e5eefc" stroke-width="2.5" marker-end="url(#arrowWhite)"></path>
  <path d="M740 465 C850 465, 860 500, 920 570" fill="none" stroke="#e5eefc" stroke-width="2.5" marker-end="url(#arrowWhite)"></path>
  <path d="M740 710 C850 700, 870 650, 920 610" fill="none" stroke="#e5eefc" stroke-width="2.5" marker-end="url(#arrowWhite)"></path>
  <path d="M360 320 C760 320, 780 450, 920 520" fill="none" stroke="#e5eefc" stroke-width="2.5" marker-end="url(#arrowWhite)"></path>

  <text x="815" y="492" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Network traffic mirrored for IDS / NSM visibility</text>

  <!-- Footer summary -->
  <rect x="110" y="780" width="1110" height="60" rx="18" fill="#0a1322" stroke="#334155"></rect>
  <text x="665" y="818" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#cbd5e1">
    Attack simulations from Kali generate host logs for Wazuh and network telemetry for Security Onion, enabling full SOC investigation workflows.
  </text>
</svg>